# Uncomment the following line to enable the Sofle OLED Display
CONFIG_ZMK_DISPLAY=y

# Uncomment these two lines to add support for encoders
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y

# Deep sleep: power down display + radio after 15 min idle to save battery
# (helps the peripheral/right half the most)
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# RGB underglow disabled entirely to save battery (LEDs stay off, no toggle key)
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y

# Mouse/pointing support (needed for encoder mouse-wheel scroll via &msc)
CONFIG_ZMK_POINTING=y
